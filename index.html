<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ACCESS BLOCKED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: black;
      color: #ff2c2c;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      border: 2px solid #ff2c2c;
      padding: 40px;
      animation: glitch 1s infinite;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    p {
      color: white;
      font-size: 18px;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-2px, -2px); }
      80% { transform: translate(2px, 2px); }
      100% { transform: translate(0); }
    }

    .btn {
      margin-top: 30px;
      padding: 12px 25px;
      background: #ff2c2c;
      color: black;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>ACCESS BLOCKED</h1>
    <p>Unauthorized attempt detected...</p>
    <p>Redirecting to secure Rockstar servers...</p>

    <a class="btn" href="https://www.rockstargames.com/VI">ENTER ANYWAY</a>
  </div>

  <script>
    setTimeout(function() {
      window.location.href = "https://www.rockstargames.com/VI";
    }, 5000);
  </script>

</body>
</html>
