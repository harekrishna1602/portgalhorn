<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R* SECURE INTRANET // PORTGALHORN NODE</title>
<style>
  body {
    margin: 0;
    background: #050505;
    color: #ffaa00; /* Rockstar-esque Yellow/Orange */
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  .container {
    width: 90%;
    max-width: 650px;
    border: 1px solid #333;
    padding: 30px;
    background: #0f0f0f;
    box-shadow: 0 0 20px rgba(255, 170, 0, 0.1);
  }
  .logo {
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    color: #ffaa00;
    margin-bottom: 20px;
    letter-spacing: 2px;
    border-bottom: 1px solid #333;
    padding-bottom: 15px;
  }
  .terminal {
    background: #000;
    padding: 15px;
    height: 220px;
    overflow-y: auto;
    border: 1px solid #222;
    font-size: 13px;
    color: #00ff41; /* Terminal green */
    line-height: 1.5;
  }
  .access-denied {
    color: #ff3333;
    font-weight: bold;
    font-size: 16px;
    text-align: center;
    margin-top: 20px;
    display: none;
    animation: blink 0.8s infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .btn {
    display: block;
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    background: #111;
    color: #ffaa00;
    border: 1px solid #ffaa00;
    font-family: 'Courier New', Courier, monospace;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
    text-transform: uppercase;
    transition: 0.2s;
  }
  .btn:hover {
    background: #ffaa00;
    color: #000;
  }
</style>
</head>
<body>

<div class="container">
  <div class="logo">R* INTERNAL NETWORK // PRJ_AMERICAS</div>
  
  <div class="terminal" id="terminal">
    > NODE: PORTGALHORN_SECURE<br>
    > STATUS: AWAITING AUTHORIZATION...
  </div>
  
  <div class="access-denied" id="alertBox">
    CRITICAL: UNAUTHORIZED ACCESS DETECTED.<br>INITIATING REDIRECT TO PUBLIC SERVERS...
  </div>
  
  <button class="btn" id="initBtn" onclick="startSequence()">Initialize Session</button>
</div>

<script>
  // Fake log sequence to build tension
  const logs = [
    "Establishing encrypted handshake...",
    "Bypassing perimeter firewalls...",
    "Connecting to central repository...",
    "Fetching assets for 'VI_Dev_Build_v0.9.1'...",
    "Decrypting payload...",
    "Verifying employee R* Social Club credentials...",
    "WARNING: Anomalous connection detected.",
    "Attempting to resolve security clearance...",
    "FAILED: Clearance level insufficient.",
    "Locking internal nodes..."
  ];

  function logText(text) {
    const terminal = document.getElementById("terminal");
    terminal.innerHTML += `<br>> ${text}`;
    terminal.scrollTop = terminal.scrollHeight;
  }

  function startSequence() {
    // Hide button and clear terminal
    document.getElementById("initBtn").style.display = "none";
    document.getElementById("terminal").innerHTML = "> INITIALIZING...";
    
    let i = 0;
    const interval = setInterval(() => {
      if (i < logs.length) {
        logText(logs[i]);
        i++;
      } else {
        clearInterval(interval);
        triggerDenied();
      }
    }, 700); // 700ms between each fake log line
  }

  function triggerDenied() {
    const terminal = document.getElementById("terminal");
    terminal.innerHTML += `<br><br><span style="color: #ff3333; font-weight: bold;">> ACCESS DENIED.</span>`;
    terminal.scrollTop = terminal.scrollHeight;
    
    // Show the blinking red alert
    document.getElementById("alertBox").style.display = "block";

    // Redirect to the actual GTA 6 page after 3.5 seconds
    setTimeout(() => {
      window.location.href = "https://www.rockstargames.com/VI";
    }, 3500);
  }
</script>

</body>
</html>
