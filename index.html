<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURE UPLINK // GTA VI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { margin: 0; background: #050505; color: #00ff9f; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .container { max-width: 650px; margin: 5vh auto; border: 1px solid #00ff9f; padding: 25px; background: rgba(0,0,0,0.9); box-shadow: 0 0 20px rgba(0,255,159,0.2); }
        h1 { text-align: center; color: #ffcc00; text-transform: uppercase; letter-spacing: 2px; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.8; transform: translateX(2px); } 100% { opacity: 1; } }
        
        #terminal { height: 250px; overflow-y: auto; background: #000; padding: 15px; border: 1px solid #333; font-size: 13px; line-height: 1.5; }
        .bar-container { margin: 20px 0; height: 10px; background: #111; border: 1px solid #00ff9f; }
        #bar { height: 100%; width: 0%; background: #00ff9f; transition: width 0.5s; }
        
        button { width: 100%; padding: 15px; background: #00ff9f; color: black; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h1 class="glitch" id="title">ROCKSTAR // SECURE GATEWAY</h1>
    <div id="terminal"></div>
    <div class="bar-container"><div id="bar"></div></div>
    <button id="initBtn" onclick="startSequence()">INITIALIZE UPLINK</button>
</div>

<script>
    const terminal = document.getElementById('terminal');
    const bar = document.getElementById('bar');
    const btn = document.getElementById('initBtn');

    function log(msg) {
        terminal.innerHTML += `> ${msg}<br>`;
        terminal.scrollTop = terminal.scrollHeight;
    }

    async function startSequence() {
        btn.style.display = 'none';
        
        // Phase 1: Fetching
        log("Establishing secure connection...");
        try {
            const res = await fetch("https://ipapi.co/json/");
            const data = await res.json();
            log(`IP DETECTED: ${data.ip}`);
            log(`ORIGIN: ${data.city}, ${data.country_name}`);
            log(`ISP: ${data.org}`);
        } catch(e) { log("Connection routed through proxy."); }

        // Phase 2: Simulation
        const steps = [
            "Fingerprinting device...",
            `OS: ${navigator.platform}`,
            "Injecting payload into Social Club API...",
            "Decrypting encrypted partitions...",
            "Bypassing internal firewall...",
            "Accessing development build metadata...",
            "GRANTING ADMINISTRATIVE CLEARANCE..."
        ];

        let i = 0;
        const interval = setInterval(() => {
            log(steps[i]);
            bar.style.width = ((i + 1) / steps.length) * 100 + "%";
            i++;
            if (i >= steps.length) {
                clearInterval(interval);
                setTimeout(finish, 1000);
            }
        }, 800);
    }

    function finish() {
        log("<span style='color:#ff0000'>CRITICAL SUCCESS: ACCESS GRANTED</span>");
        setTimeout(() => {
            window.location.replace("https://www.rockstargames.com/VI");
        }, 1500);
    }
</script>
</body>
</html>
